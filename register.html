<!DOCTYPE html>
<html>
<head>

<title>Register</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container">

<h2 class="text-center">Register</h2>

<form onsubmit="register(event)">

<input type="text" id="regUser" placeholder="Username" class="form-control mb-3" required>

<input type="password" id="regPass" placeholder="Password" class="form-control mb-3" required>

<button class="btn btn-success w-100">Register</button>

</form>

<p class="text-center mt-3">
Already registered? <a href="index.html">Login</a>
</p>

</div>

<script src="script.js"></script>

</body>
</html>
