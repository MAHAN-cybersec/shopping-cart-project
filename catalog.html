<!DOCTYPE html>
<html>
<head>

<title>Catalog</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container">

<h2 class="text-center mb-4">Product Catalog</h2>

<a href="cart.html" class="btn btn-warning mb-3">View Cart</a>

<div class="product-grid">

<div class="card product">

<h5>Laptop</h5>
<p>₹50000</p>

<button onclick="addToCart('Laptop',50000)" class="btn btn-primary">
Add to Cart
</button>

</div>

<div class="card product">

<h5>Phone</h5>
<p>₹20000</p>

<button onclick="addToCart('Phone',20000)" class="btn btn-primary">
Add to Cart
</button>

</div>

<div class="card product">

<h5>Headphones</h5>
<p>₹3000</p>

<button onclick="addToCart('Headphones',3000)" class="btn btn-primary">
Add to Cart
</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
